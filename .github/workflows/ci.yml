name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: python -m ruff check futsalmot_rl/ tests/
      - run: python -m ruff format --check futsalmot_rl/ tests/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install .[rl] pytest
      - run: python -m compileall futsalmot_rl/ -q
      - run: python -m pytest tests/ -v --tb=short -q

  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install .[rl] pytest
      - run: python -m pytest tests/unit/test_paths.py -v --tb=short -q

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - run: pip install dist/*.whl
      - run: python -c "import futsalmot_rl; print('wheel OK')"
      - name: Test CLI outside repo
        run: |
          cd /tmp
          python -c "import futsalmot_rl; print('import OK')"
          python -m futsalmot_rl.cli --help
